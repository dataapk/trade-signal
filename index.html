<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI // Ultimate Crypto Signal Terminal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        cyber: ['Orbitron', 'sans-serif']
                    },
                    colors: {
                        darkBg: '#03050d',
                        lightBg: '#f8fafc',
                        neonGreen: '#00ffa3',
                        neonBlue: '#00e5ff',
                        neonRed: '#ff0055',
                        gold: '#ffd700'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-darkBg text-white min-h-screen flex flex-col">

<!-- TOP TICKER -->
<div class="bg-black text-xs p-2 text-center">
    BTC ETH SOL LIVE MARKET
</div>

<!-- MAIN WRAPPER -->
<div class="flex flex-1">

    <!-- SIDEBAR -->
    <aside class="w-20 bg-black/40 p-3">
        <div class="text-neonBlue font-bold">NX</div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-4 overflow-y-auto">

        <!-- HEADER -->
        <header class="mb-4">
            <h1 class="text-xl font-bold">NEXUS AI SIGNAL HUB</h1>
        </header>

        <!-- MARKET PANEL -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

            <!-- LEFT -->
            <div class="bg-black/30 p-3 rounded-xl">
                <h2 class="text-sm mb-2">Chart</h2>
                <div class="h-40 bg-gray-800 rounded"></div>
            </div>

            <!-- RIGHT (LIVE SIGNALS) -->
            <div class="bg-black/30 p-3 rounded-xl">

                <h2 class="text-sm mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-satellite-dish text-neonBlue"></i>
                    Live Signal Feed
                </h2>

                <!-- 🔥 THIS IS YOUR DYNAMIC AREA -->
                <div id="signalsContainer" class="space-y-3"></div>

            </div>

        </div>

        <!-- HISTORY -->
        <div class="mt-4 bg-black/30 p-3 rounded-xl">
            <h2 class="text-sm mb-2">History</h2>
            <div id="historyTableBody"></div>
        </div>

    </main>

</div>

<!-- SUPABASE SCRIPT -->
<script src="index.js"></script>

</body>
</html>
