<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Admin Login</title>

  <style>

    body{
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial;
    }

    .login-box{
      background:#1e293b;
      padding:40px;
      border-radius:15px;
      width:300px;
      text-align:center;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:20px;
      border:none;
      border-radius:10px;
      background:#38bdf8;
      color:white;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <h2 style="color:white;">
      Admin Login
    </h2>

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <button onclick="login()">
      Login
    </button>

  </div>


  <script>

    function login(){

      let password =
        document.getElementById("password").value;

      // এখানে password দাও

      if(password === "123456"){

        window.location.href = "admin.html";

      }else{

        alert("Wrong Password");

      }

    }

  </script>

</body>
</html>
